spring.application.name=sistema-comissao
server.address=127.0.0.1
server.port=${PORT:8080}

# ===== JPA =====
spring.jpa.open-in-view=false

# Profile ativo (vem do Docker)
spring.profiles.active=${PROFILES_APP:dev}

# Jackson
spring.jackson.serialization.write-dates-as-timestamps=false
spring.jackson.time-zone=America/Sao_Paulo

# Multipart Upload Limits (protege contra spikes de memória)
spring.servlet.multipart.max-file-size=2MB
spring.servlet.multipart.max-request-size=5MB

# JWT
security.jwt.secret-key=${JWT_SECRET}

# Actuator (BASE)
management.endpoints.web.base-path=/actuator
management.endpoints.web.exposure.include=health
management.endpoint.health.show-details=never
management.health.mail.enabled=false

# ===== CACHE =====
spring.cache.type=caffeine
spring.cache.caffeine.spec=maximumSize=20000,expireAfterWrite=60s

# ===== LOGGING (Auth Debug) =====
logging.level.com.empresa.comissao.security=INFO
logging.level.com.empresa.comissao.config=INFO

# ===== FLYWAY PLACEHOLDERS (DEV DEFAULT) =====
spring.flyway.placeholders.apply_rls=false
spring.flyway.placeholders.backend_role=comissao

# ===== TOMCAT THREADS =====
server.tomcat.threads.max=30

# ===== CONNECTION POOL (Hikari) =====
spring.datasource.hikari.maximum-pool-size=5
spring.datasource.hikari.minimum-idle=2
spring.datasource.hikari.idle-timeout=30000
spring.datasource.hikari.connection-timeout=20000
spring.datasource.hikari.max-lifetime=1800000
spring.datasource.hikari.connection-test-query=SELECT 1
spring.datasource.hikari.leak-detection-threshold=30000
spring.datasource.hikari.keepalive-time=30000
spring.datasource.hikari.auto-commit=true
spring.datasource.hikari.initialization-fail-timeout=-1
spring.datasource.hikari.register-mbeans=true
spring.datasource.hikari.metric-registry=micrometer
